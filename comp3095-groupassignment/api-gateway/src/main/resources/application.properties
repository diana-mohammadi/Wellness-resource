# Server Configuration
server.port=9000

# Application Name
spring.application.name=api-gateway

# Service URLs
wellness.service.url=http://wellness-resource-service:8081
goal.service.url=http://goal-tracking-service:8082
event.service.url=http://event-service:8083

# Keycloak OAuth2 Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/wellness-hub
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/wellness-hub/protocol/openid-connect/certs

# Keycloak Configuration for Swagger
keycloak.auth-server-url=http://keycloak:8080
keycloak.realm=wellness-hub

# Logging
logging.level.ca.gbc.apigateway=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.reactor.netty=INFO

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Resilience4J Circuit Breaker Configuration
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

resilience4j.circuitbreaker.instances.wellnessServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.goalServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.eventServiceCircuitBreaker.baseConfig=default

# Resilience4J Timeout
resilience4j.timelimiter.configs.default.timeoutDuration=3s
resilience4j.timelimiter.instances.wellnessServiceCircuitBreaker.baseConfig=default
resilience4j.timelimiter.instances.goalServiceCircuitBreaker.baseConfig=default
resilience4j.timelimiter.instances.eventServiceCircuitBreaker.baseConfig=default

# OpenAPI/Swagger Configuration
springdoc.swagger-ui.path=/api/swagger-ui
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.urls[0].name=Wellness Resource Service
springdoc.swagger-ui.urls[0].url=/aggregate/wellness-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Goal Tracking Service
springdoc.swagger-ui.urls[1].url=/aggregate/goal-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Event Service
springdoc.swagger-ui.urls[2].url=/aggregate/event-service/v3/api-docs
